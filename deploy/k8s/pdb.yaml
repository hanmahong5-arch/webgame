apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lurus-www-pdb
  namespace: lurus-www
  labels:
    app: lurus-www
    app.kubernetes.io/name: lurus-www
    app.kubernetes.io/part-of: lurus
spec:
  # With replicas=1, minAvailable must be 0 to allow voluntary evictions
  # (node drain, cluster upgrades). Change to 1 when scaling to 2+ replicas.
  minAvailable: 0
  selector:
    matchLabels:
      app: lurus-www
