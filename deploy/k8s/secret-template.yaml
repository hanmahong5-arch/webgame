# Template only — DO NOT commit actual values.
# Create the secret manually before first deployment:
#
#   kubectl create secret generic lurus-www-secret -n lurus-www \
#     --from-literal=secret-key-base="$(openssl rand -hex 64)" \
#     --from-literal=zitadel-client-id="YOUR_ZITADEL_CLIENT_ID"
#
# To rotate SECRET_KEY_BASE (invalidates all sessions):
#   kubectl create secret generic lurus-www-secret -n lurus-www \
#     --from-literal=secret-key-base="$(openssl rand -hex 64)" \
#     --from-literal=zitadel-client-id="UNCHANGED" \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl rollout restart deployment/lurus-www -n lurus-www
apiVersion: v1
kind: Secret
metadata:
  name: lurus-www-secret
  namespace: lurus-www
type: Opaque
stringData:
  secret-key-base: "REPLACE_ME"
  zitadel-client-id: "REPLACE_ME"
