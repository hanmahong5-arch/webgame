apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgame
  namespace: lurus-webgame
  labels:
    app: webgame
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: webgame
      app.kubernetes.io/name: webgame
      app.kubernetes.io/part-of: lurus
  template:
    metadata:
      labels:
        app: webgame
        app.kubernetes.io/name: webgame
        app.kubernetes.io/part-of: lurus
    spec:
      # Schedule on cloud-ali-4 (www-gateway) — local Traefik handles TLS.
      nodeSelector:
        lurus.cn/role: www-gateway
      tolerations:
        - key: lurus.cn/www-only
          value: "true"
          effect: NoSchedule
        - key: svclb-exclude
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: webgame
          image: ghcr.io/hanmahong5-arch/webgame:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              value: "webgame.lurus.cn"
            - name: PORT
              value: "4000"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: webgame-secret
                  key: secret-key-base
            - name: ZITADEL_ISSUER
              value: "https://auth.lurus.cn"
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: webgame-secret
                  key: zitadel-client-id
            - name: API_URL
              value: "https://api.lurus.cn"
            - name: CHAT_ENABLED
              value: "false"
            - name: RELEASE_TMP
              value: "/tmp"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
